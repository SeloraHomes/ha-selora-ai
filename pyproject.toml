[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long — formatter handles it
    "B008",   # function calls in argument defaults (common in HA)
    "SIM117", # nested with statements (readability preference)
    "UP007",  # X | Y union syntax (keep Optional for HA compat)
]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["custom_components.selora_ai"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
