# Lefthook — git hooks manager (https://github.com/evilmartians/lefthook)
#
# Install once per developer:
#   brew install lefthook && lefthook install
#
# Hooks run automatically on git operations. Skip a hook with:
#   LEFTHOOK=0 git commit ...
commit-msg:
  commands:
    commitlint:
      run: sed '/^#/d; /^diff --git/,$d' {1} | sed '/^$/d' | docker run --rm -i -v $(pwd):/workspace -w /workspace commitlint/commitlint:latest

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "custom_components/**/*.py"
      run: ruff check {staged_files}
      fail_text: "Ruff lint errors. Auto-fix with: ruff check --fix custom_components/"

    format:
      glob: "custom_components/**/*.py"
      run: ruff format --check {staged_files}
      fail_text: "Formatting issues. Auto-fix with: ruff format custom_components/"

pre-push:
  parallel: true
  commands:
    test-python:
      glob: "**/*.py"
      run: >-
        if [ ! -d ".venv" ]; then
          echo "⚙ No .venv found — creating one...";
          uv venv .venv --python 3.13 &&
          uv pip install --python .venv/bin/python pytest pytest-asyncio pytest-homeassistant-custom-component 'ruamel.yaml>=0.18' anthropic home-assistant-intents hassil;
        fi &&
        .venv/bin/python -m pytest tests/ -q
      fail_text: "Python tests failed. Run: pytest tests/ -v"

    test-frontend:
      glob:
        - "custom_components/selora_ai/frontend/src/**/*.js"
        - "custom_components/selora_ai/frontend/vitest.config.js"
        - "custom_components/selora_ai/frontend/package.json"
        - "custom_components/selora_ai/frontend/package-lock.json"
      run: cd custom_components/selora_ai/frontend && npx vitest run
      fail_text: "Frontend tests failed. Run: cd custom_components/selora_ai/frontend && npx vitest run"

    frontend-build:
      glob:
        - "custom_components/selora_ai/frontend/src/**/*.js"
        - "custom_components/selora_ai/frontend/build.js"
        - "custom_components/selora_ai/frontend/postbuild.js"
        - "custom_components/selora_ai/frontend/package.json"
        - "custom_components/selora_ai/frontend/package-lock.json"
      run: cd custom_components/selora_ai/frontend && npm run build
      fail_text: "Frontend build failed."

    lint-all:
      run: ruff check custom_components/
      fail_text: "Ruff lint errors. Auto-fix with: ruff check --fix custom_components/"

    format-all:
      run: ruff format --check custom_components/
      fail_text: "Formatting issues. Auto-fix with: ruff format custom_components/"

    test-release-script:
      glob:
        - "scripts/github-release.mjs"
        - "scripts/github-release.test.mjs"
      run: node --test scripts/github-release.test.mjs
      fail_text: "Release script tests failed. Run: node --test scripts/github-release.test.mjs"

    validate-hacs:
      glob: "custom_components/selora_ai/manifest.json"
      run: python3 scripts/validate_hacs.py
      fail_text: "HACS validation failed. See output above."

    validate-manifest:
      glob: "custom_components/selora_ai/manifest.json"
      run: python3 scripts/validate_manifest.py
      fail_text: "Manifest validation failed. See output above."

    validate-hassfest:
      glob: "custom_components/selora_ai/**"
      run: 'mkdir -p .hassfest_tmp && rsync -a --delete --exclude node_modules custom_components/ .hassfest_tmp/custom_components/ && docker run --rm -v "$(pwd)/.hassfest_tmp/custom_components:/github/workspace/custom_components" ghcr.io/home-assistant/hassfest; rc=$?; rm -rf .hassfest_tmp; exit $rc'
      fail_text: "Hassfest validation failed. See output above."
