# Selora AI — GitLab CI Pipeline
# Runs on every merge request and on pushes to the default branch.

stages:
  - lint
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SAST_EXCLUDED_PATHS: ""

.pip-cache: &pip-cache
  cache:
    key: "pip-py314-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip

.default-rules: &default-rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^[0-9]+\.[0-9]+\.x$/

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^[0-9]+\.[0-9]+\.x$/

# =============================================================================
# STAGE: lint
# =============================================================================

lint:ruff:
  stage: lint
  image: python:3.14-slim
  <<: *pip-cache
  before_script:
    - pip install ruff --quiet
  script:
    - echo "ruff lint"
    - ruff check custom_components/
    - echo "ruff format check"
    - ruff format --check custom_components/

lint:prettier:
  stage: lint
  image: node:lts-slim
  <<: *default-rules
  script:
    - cd custom_components/selora_ai/frontend
    - npm ci
    - npx prettier --check src/**/*.js *.js

# =============================================================================
# STAGE: test
# =============================================================================

validate:
  stage: test
  image: python:3.14-slim
  script:
    - python3 scripts/validate_hacs.py
    - python3 scripts/validate_manifest.py

unit:
  stage: test
  image: python:3.14-slim
  <<: *pip-cache
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc python3-dev > /dev/null
    - pip install pytest pytest-asyncio pytest-homeassistant-custom-component "ruamel.yaml>=0.18" anthropic home-assistant-intents hassil PyJWT --quiet
  script:
    - pytest tests/ -v

frontend:
  stage: test
  image: node:lts-slim
  <<: *default-rules
  script:
    - cd custom_components/selora_ai/frontend
    - npm ci
    - npx vitest run

release-script:
  stage: test
  image: node:lts-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - scripts/github-release.mjs
        - scripts/github-release.test.mjs
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - scripts/github-release.mjs
        - scripts/github-release.test.mjs
  script:
    - node --test scripts/github-release.test.mjs

# =============================================================================
# STAGE: release (main branch only)
# =============================================================================

# Requires CI variables (Settings -> CI/CD -> Variables, masked + protected):
#   GL_TOKEN — GitLab project access token (api + write_repository scope)
#   GH_TOKEN — GitHub personal access token (repo scope) for HACS mirror releases

release:
  stage: release
  image: node:lts-alpine
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Maintenance branches (e.g. `0.8.x`): manual-only via the Run pipeline
    # button so a patch release is an explicit decision, not a side effect
    # of pushing a cherry-pick.
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH =~ /^[0-9]+\.[0-9]+\.x$/
  before_script:
    - apk add --no-cache git zip
    - npm ci
    - cd custom_components/selora_ai/frontend && npm ci && cd ../../..
  script:
    - npx semantic-release
  variables:
    GIT_AUTHOR_NAME: "semantic-release[bot]"
    GIT_AUTHOR_EMAIL: "semantic-release@selora.ai"
    GIT_COMMITTER_NAME: "semantic-release[bot]"
    GIT_COMMITTER_EMAIL: "semantic-release@selora.ai"
