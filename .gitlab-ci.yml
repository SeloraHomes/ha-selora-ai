# Selora AI — GitLab CI Pipeline
# Runs on every merge request and on pushes to the default branch.

stages:
  - lint
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SAST_EXCLUDED_PATHS: ""
  # Default Python for non-matrix jobs; matrix entries in `unit` override this.
  PYTHON_VERSION: "3.14"

.pip-cache: &pip-cache
  cache:
    key: "pip-py$PYTHON_VERSION-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip

.default-rules: &default-rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "next"
    - if: $CI_COMMIT_BRANCH =~ /^[0-9]+\.[0-9]+\.x$/

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # `next` is the machine-managed prerelease mirror of main (see mirror-next).
    - if: $CI_COMMIT_BRANCH == "next"
    - if: $CI_COMMIT_BRANCH =~ /^[0-9]+\.[0-9]+\.x$/

# =============================================================================
# STAGE: lint
# =============================================================================

lint:ruff:
  stage: lint
  image: python:3.14-slim
  <<: *pip-cache
  before_script:
    - pip install ruff --quiet
  script:
    - echo "ruff lint"
    - ruff check custom_components/
    - echo "ruff format check"
    - ruff format --check custom_components/

lint:prettier:
  stage: lint
  image: node:lts-slim
  <<: *default-rules
  script:
    - cd custom_components/selora_ai/frontend
    - npm ci
    - npx prettier --check src/**/*.js *.js

# =============================================================================
# STAGE: test
# =============================================================================

validate:
  stage: test
  image: python:3.14-slim
  script:
    - python3 scripts/validate_hacs.py
    - python3 scripts/validate_manifest.py

unit:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.13", "3.14"]
  <<: *pip-cache
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc python3-dev > /dev/null
    - pip install pytest pytest-asyncio pytest-homeassistant-custom-component "ruamel.yaml>=0.18" anthropic PyJWT "rapidfuzz>=3.0" --quiet
    # Pin hassil / home-assistant-intents to the exact versions the installed HA's
    # conversation component requires — unpinned pulls a newer build that dropped
    # FuzzyConfig, breaking test_conversation collection.
    - pip install --quiet $(python -c "import importlib.util,json,os; s=importlib.util.find_spec('homeassistant.components.conversation'); print(' '.join(json.load(open(os.path.join(os.path.dirname(s.origin),'manifest.json')))['requirements']))")
  script:
    - pytest tests/ -v

soak:
  stage: test
  image: python:3.14-slim
  <<: *pip-cache
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc python3-dev > /dev/null
    - pip install pytest pytest-asyncio pytest-homeassistant-custom-component "ruamel.yaml>=0.18" anthropic PyJWT "rapidfuzz>=3.0" --quiet
    # Pin hassil / home-assistant-intents to the exact versions the installed HA's
    # conversation component requires — unpinned pulls a newer build that dropped
    # FuzzyConfig, breaking test_conversation collection.
    - pip install --quiet $(python -c "import importlib.util,json,os; s=importlib.util.find_spec('homeassistant.components.conversation'); print(' '.join(json.load(open(os.path.join(os.path.dirname(s.origin),'manifest.json')))['requirements']))")
  script:
    - pytest tests/ -m soak -v
  # Soak tests sleep through rate-limiter windows and pump tens of
  # thousands of records — wall time is dominated by sleeps, not CPU.
  # Capping at 5 min stops a hang from blocking the pipeline forever.
  timeout: 5 minutes

frontend:
  stage: test
  image: node:lts-slim
  <<: *default-rules
  script:
    - cd custom_components/selora_ai/frontend
    - npm ci
    - npx vitest run

release-script:
  stage: test
  image: node:lts-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - scripts/github-release.mjs
        - scripts/github-release.test.mjs
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - scripts/github-release.mjs
        - scripts/github-release.test.mjs
  script:
    - node --test scripts/github-release.test.mjs

release-patch-script:
  stage: test
  image: python:3.14-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - scripts/release_patch.py
        - scripts/release_patch_test.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - scripts/release_patch.py
        - scripts/release_patch_test.py
  script:
    - python3 scripts/release_patch_test.py

# =============================================================================
# STAGE: release (main branch only)
# =============================================================================

# Requires CI variables (Settings -> CI/CD -> Variables, masked + protected):
#   GL_TOKEN — GitLab project access token (api + write_repository scope)
#   GH_TOKEN — GitHub personal access token (repo scope) for HACS mirror releases

# Stable release: scheduled or manual ("Run pipeline" web button) on main, or
# manual on a maintenance branch. Cuts a clean vX.Y.Z and commits the
# CHANGELOG/manifest bump back. This is the only release HACS shows by default.
release:
  stage: release
  image: node:lts-alpine
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Maintenance branches (e.g. `0.8.x`): manual-only via the Run pipeline
    # button so a patch release is an explicit decision, not a side effect
    # of pushing a cherry-pick.
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH =~ /^[0-9]+\.[0-9]+\.x$/
  before_script:
    - apk add --no-cache git zip
    - npm ci
    - cd custom_components/selora_ai/frontend && npm ci && cd ../../..
  script:
    - npx semantic-release
  variables:
    GIT_AUTHOR_NAME: "semantic-release[bot]"
    GIT_AUTHOR_EMAIL: "semantic-release@selora.ai"
    GIT_COMMITTER_NAME: "semantic-release[bot]"
    GIT_COMMITTER_EMAIL: "semantic-release@selora.ai"

# Mirror main → next on every push to main. semantic-release won't let main
# itself be the prerelease branch (it requires at least one stable release
# branch), so `next` is a machine-managed mirror that carries the prerelease
# channel. Fast-forwarding next here is what makes "every push to main yields a
# prerelease" work: the push below triggers a `next` pipeline whose `prerelease`
# job tags the -pre. Runs in the release stage so it only fires after tests pass.
mirror-next:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache git
  script:
    # Plain (fast-forward) push: `next` is only ever advanced by this job and
    # main only moves forward, so next is always a strict ancestor of main —
    # a fast-forward. No `-f`, matching the branch's allow_force_push = false;
    # a non-fast-forward here means something manually touched next and should
    # fail loudly rather than be papered over.
    - git push "https://oauth2:${GL_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:next"

# Prerelease: every push to `next` cuts a vX.Y.Z-pre.N tag (PRERELEASE=true flips
# release.config.js to the prerelease channel). It tags + publishes only — no commit
# back — and the GitHub release is flagged as a prerelease so HACS ignores it
# unless a user opts into betas. mirror-next keeps `next` fast-forwarded to main,
# so this fires on every main push; the stable `release` job above cuts the
# clean vX.Y.Z when triggered manually/on schedule.
prerelease:
  stage: release
  image: node:lts-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "next"
  before_script:
    - apk add --no-cache git zip
    - npm ci
    - cd custom_components/selora_ai/frontend && npm ci && cd ../../..
  script:
    - npx semantic-release
  variables:
    PRERELEASE: "true"
    GIT_AUTHOR_NAME: "semantic-release[bot]"
    GIT_AUTHOR_EMAIL: "semantic-release@selora.ai"
    GIT_COMMITTER_NAME: "semantic-release[bot]"
    GIT_COMMITTER_EMAIL: "semantic-release@selora.ai"
