# Selora AI — GitLab CI Pipeline
# Runs on every merge request and on pushes to the default branch.

stages:
  - lint
  - validate
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.pip-cache: &pip-cache
  cache:
    key: "pip-py313-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip

.default-rules: &default-rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# STAGE: lint
# =============================================================================

lint:ruff:
  stage: lint
  image: python:3.13-slim
  <<: *pip-cache
  <<: *default-rules
  before_script:
    - pip install ruff --quiet
  script:
    - echo "ruff lint"
    - ruff check custom_components/
    - echo "ruff format check"
    - ruff format --check custom_components/

# =============================================================================
# STAGE: validate
# =============================================================================

validate:hacs:
  stage: validate
  image: python:3.13-slim
  <<: *default-rules
  script:
    - python3 scripts/validate_hacs.py

validate:manifest:
  stage: validate
  image: python:3.13-slim
  <<: *default-rules
  script:
    - python3 scripts/validate_manifest.py

# =============================================================================
# STAGE: test
# =============================================================================

test:unit:
  stage: test
  image: python:3.13-slim
  <<: *pip-cache
  <<: *default-rules
  before_script:
    - pip install pytest pytest-asyncio --quiet
  script:
    - >-
      if [ -d "tests" ]; then
        pytest tests/ -v;
      else
        echo "No tests/ directory — skipping";
      fi

# =============================================================================
# STAGE: release  (main branch only)
# =============================================================================
# Requires CI variables (Settings -> CI/CD -> Variables, masked + protected):
#   GL_TOKEN — GitLab project access token (api + write_repository scope)
#   GH_TOKEN — GitHub personal access token (repo scope) for HACS mirror releases

release:semantic:
  stage: release
  image: node:lts-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3 git --no-install-recommends
    - npm install --global --quiet
      semantic-release
      @semantic-release/commit-analyzer
      @semantic-release/release-notes-generator
      @semantic-release/changelog
      @semantic-release/exec
      @semantic-release/git
      @semantic-release/gitlab
      @semantic-release/github
      conventional-changelog-conventionalcommits
  script:
    - npx semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
  variables:
    GL_TOKEN: $GL_TOKEN
    GH_TOKEN: $GH_TOKEN
    GIT_AUTHOR_NAME: "semantic-release[bot]"
    GIT_AUTHOR_EMAIL: "semantic-release@selora.ai"
    GIT_COMMITTER_NAME: "semantic-release[bot]"
    GIT_COMMITTER_EMAIL: "semantic-release@selora.ai"
