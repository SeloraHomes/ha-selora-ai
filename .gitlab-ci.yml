# Selora AI — GitLab CI Pipeline
# Runs on every merge request and on pushes to the default branch.

stages:
  - lint
  - validate
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SAST_EXCLUDED_PATHS: "custom_components/selora_ai/frontend/panel.js,custom_components/selora_ai/frontend/card.js"

.pip-cache: &pip-cache
  cache:
    key: "pip-py313-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip

.default-rules: &default-rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# STAGE: lint
# =============================================================================

lint:ruff:
  stage: lint
  image: python:3.13-slim
  <<: *pip-cache
  before_script:
    - pip install ruff --quiet
  script:
    - echo "ruff lint"
    - ruff check custom_components/
    - echo "ruff format check"
    - ruff format --check custom_components/

lint:prettier:
  stage: lint
  image: node:lts-slim
  <<: *default-rules
  script:
    - cd custom_components/selora_ai/frontend
    - npm ci
    - npx prettier --check src/**/*.js *.js

# =============================================================================
# STAGE: validate
# =============================================================================

validate:
  stage: validate
  image: python:3.13-slim
  script:
    - python3 scripts/validate_hacs.py
    - python3 scripts/validate_manifest.py

# =============================================================================
# STAGE: test
# =============================================================================

unit:
  stage: test
  image: python:3.13-slim
  <<: *pip-cache
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc python3-dev > /dev/null
    - pip install pytest pytest-asyncio pytest-homeassistant-custom-component "ruamel.yaml>=0.18" anthropic home-assistant-intents hassil "mcp==1.26.0" --quiet
  script:
    - pytest tests/ -v

frontend:
  stage: test
  image: node:lts-slim
  <<: *default-rules
  script:
    - cd custom_components/selora_ai/frontend
    - npm ci
    - npx vitest run

# =============================================================================
# STAGE: release (main branch only)
# =============================================================================

# Requires CI variables (Settings -> CI/CD -> Variables, masked + protected):
#   GL_TOKEN — GitLab project access token (api + write_repository scope)
#   GH_TOKEN — GitHub personal access token (repo scope) for HACS mirror releases

release:
  stage: release
  image: node:lts-alpine
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache git
    - npm ci
  script:
    - npx semantic-release
  variables:
    GIT_AUTHOR_NAME: "semantic-release[bot]"
    GIT_AUTHOR_EMAIL: "semantic-release@selora.ai"
    GIT_COMMITTER_NAME: "semantic-release[bot]"
    GIT_COMMITTER_EMAIL: "semantic-release@selora.ai"
